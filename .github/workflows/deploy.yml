name: Publikacja Next.js na GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Konfiguracja GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalacja zależności
        run: npm ci

      - name: Budowanie aplikacji
        run: npm run build

      - name: Przesłanie strony
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publikacja strony
        id: deployment
        uses: actions/deploy-pages@v5
